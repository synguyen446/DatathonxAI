<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-grid"></div>

  <!-- ── Upload page ── -->
  <div id="page-upload" class="page active">
    <header>
      <div class="logo"><span class="logo-icon">🤖</span> <span>AI</span>Detect</div>
      <p class="tagline">find out if an image was made by AI or a human</p>
    </header>

    <main>
      <div class="card">
        <div class="tabs">
          <button class="tab active" data-tab="url">Paste URL</button>
          <button class="tab" data-tab="file">Upload Images</button>
        </div>

        <!-- URL panel -->
        <div class="panel" id="panel-url">
          <div class="url-input-wrap">
            <input type="text" id="url-input" placeholder="https://example.com/image.jpg" autocomplete="off" spellcheck="false" />
            <button id="url-btn" class="analyze-btn">Analyze</button>
          </div>
          <div id="url-preview-wrap" class="preview-wrap hidden">
            <img id="url-preview" src="" alt="Preview" />
          </div>
          <div id="url-result" class="result hidden"></div>
        </div>

        <!-- File upload panel -->
        <div class="panel hidden" id="panel-file">
          <!-- Grid: thumbnails + add-more tile -->
          <div class="thumb-grid" id="thumb-grid">
            <label class="thumb-add" id="thumb-add" title="Add images">
              <span class="thumb-add-icon">+</span>
              <span class="thumb-add-label">Add photos</span>
              <span class="thumb-add-count" id="drop-limit">0 / 5</span>
              <input type="file" id="file-input" accept="image/*" multiple hidden />
            </label>
          </div>

          <button id="file-btn" class="analyze-btn hidden">Analyze <span id="file-count"></span></button>
        </div>
      </div>
    </main>

    <footer>Powered by a CNN model · <span>localhost:8000</span></footer>
  </div>

  <!-- ── Results page ── -->
  <div id="page-results" class="page hidden">
    <header class="results-header">
      <button id="back-btn" class="back-btn">← Back</button>
      <div class="logo small"><span class="logo-icon">🤖</span> <span>AI</span>Detect</div>
      <div style="width:80px"></div>
    </header>

    <div class="results-title">
      <h2>Analysis Results</h2>
      <p id="results-sub" class="tagline"></p>
    </div>

    <div class="results-grid" id="results-grid"></div>

    <footer>Powered by a CNN model · <span>localhost:8000</span></footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
